<title>Спасибо | KIQ Labs Global</title>
<style>
  :root {
    --bg: #1c1c1e;
    --bg2: #252527;
    --white: #ffffff;
    --gray: rgba(255,255,255,0.65);
    --border: rgba(255,255,255,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
      linear-gradient(160deg, var(--bg) 0%, #121214 100%);
    color: var(--white);
    font-family: Inter, Arial, sans-serif;
  }

  .card {
    width: min(100%, 640px);
    padding: 40px 32px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: rgba(37,37,39,0.9);
    box-shadow: 0 24px 80px rgba(0,0,0,0.35);
  }

  .eyebrow {
    margin-bottom: 16px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gray);
  }

  h1 {
    margin-bottom: 14px;
    font-size: clamp(36px, 7vw, 56px);
    line-height: 0.95;
    letter-spacing: -0.04em;
  }

  p {
    max-width: 48ch;
    font-size: 16px;
    line-height: 1.6;
    color: var(--gray);
  }

  .actions {
    margin-top: 28px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 15px 22px;
    border-radius: 12px;
    background: var(--white);
    color: var(--bg);
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
  }
</style>
